  <script>
    window.__STATIC_EMBED_STATUS_ROOT__ = 'pending';
    window.__STATIC_EMBED_STATUS__ = 'pending';
    window.__STATIC_EMBED_SELECTED__ = null;
    window.__STATIC_EMBED_TRACE__ = [];
    window.__STATIC_EMBED_ERROR__ = window.__STATIC_EMBED_ERROR__ || null;
    (function loadStaticEmbedSequentially() {
      var candidates = [
        { key: 'root-js', url: './predict-history.embed.js' },
        { key: 'root-txt', url: './predict-history.embed.txt' },
        { key: 'data-js', url: './data/predict-history.embed.js' },
        { key: 'data-txt', url: './data/predict-history.embed.txt' }
      ];
      var i = 0;
      var cacheBust = 'v=' + Date.now();
      function markLoaded(key) {
        if (key.indexOf('root-') === 0) window.__STATIC_EMBED_STATUS_ROOT__ = 'loaded';
        if (key.indexOf('data-') === 0) window.__STATIC_EMBED_STATUS__ = 'loaded';
      }
      function markError(key) {
        if (key.indexOf('root-') === 0) window.__STATIC_EMBED_STATUS_ROOT__ = 'error';
        if (key.indexOf('data-') === 0) window.__STATIC_EMBED_STATUS__ = 'error';
      }
      function tryNext() {
        if (i >= candidates.length) return;
        var c = candidates[i++];
        var script = document.createElement('script');
        script.charset = 'utf-8';
        script.src = c.url + (c.url.indexOf('?') >= 0 ? '&' : '?') + cacheBust;
        script.onload = function () {
          markLoaded(c.key);
          var ok = !!(window.__STATIC_PREDICT_HISTORY__ && Array.isArray(window.__STATIC_PREDICT_HISTORY__.data) && window.__STATIC_PREDICT_HISTORY__.data.length);
          window.__STATIC_EMBED_TRACE__.push({ key: c.key, status: 'loaded', ok: ok, src: script.src });
          if (ok) {
            window.__STATIC_EMBED_SELECTED__ = c.key;
            return;
          }
          tryNext();
        };
        script.onerror = function () {
          markError(c.key);
          window.__STATIC_EMBED_TRACE__.push({ key: c.key, status: 'error', ok: false, src: script.src });
          tryNext();
        };
        document.head.appendChild(script);
      }
      tryNext();
    })();
    window.addEventListener('error', function (e) {
      try {
        var target = e && e.target;
        var src = target && target.tagName === 'SCRIPT' ? String(target.src || '') : '';
        if (src && src.indexOf('predict-history.embed') >= 0) {
          window.__STATIC_EMBED_ERROR__ = {
            message: String(e.message || 'embed-script-parse-or-load-error'),
            filename: String(e.filename || ''),
            lineno: Number(e.lineno || 0),
            colno: Number(e.colno || 0),
            src: src
          };
        }
        if ((!src || src.indexOf('predict-history.embed') < 0) && String(e.filename || '').indexOf('predict-history.embed') >= 0) {
          window.__STATIC_EMBED_ERROR__ = {
            message: String(e.message || 'embed-runtime-error'),
            filename: String(e.filename || ''),
            lineno: Number(e.lineno || 0),
            colno: Number(e.colno || 0),
            src: String(e.filename || '')
          };
        }
      } catch (_) {}
    }, true);
  </script>

<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ==================== 缓存管理器 ====================
    class CacheManager {
      constructor() {
        this.cacheConfig = {
          impactCoefficient: 5 * 60 * 1000,     // 5 分钟
          riskLevel: 30 * 60 * 1000,            // 30 分钟
          riskReason: 24 * 60 * 60 * 1000,      // 24 小时
          baseData: 1 * 60 * 1000               // 1 分钟
        };
      }

      // 设置缓存
      set(key, data) {
        try {
          const cacheData = {
            data: data,
            timestamp: Date.now()
          };
          localStorage.setItem(key, JSON.stringify(cacheData));
        } catch (e) {
          console.warn('缓存设置失败:', e);
        }
      }

      // 获取缓存
      get(key) {
        try {
          const cached = localStorage.getItem(key);
          if (!cached) return null;
          
          const { data, timestamp } = JSON.parse(cached);
          return { data, timestamp };
        } catch (e) {
          console.warn('缓存读取失败:', e);
          return null;
        }
      }

      // 检查缓存是否过期
      isExpired(key) {
        const cached = this.get(key);
        if (!cached) return true;
        
        // 根据缓存 key 前缀确定 TTL
        let ttl = 60000; // 默认 1 分钟
        if (key.startsWith('impact_')) {
          ttl = this.cacheConfig.impactCoefficient; // 5 分钟
        } else if (key.startsWith('risk_level_')) {
          ttl = this.cacheConfig.riskLevel; // 30 分钟
        } else if (key.startsWith('risk_reason_')) {
          ttl = this.cacheConfig.riskReason; // 24 小时
        } else if (key.startsWith('base_')) {
          ttl = this.cacheConfig.baseData; // 1 分钟
        }
        
        const now = Date.now();
        return (now - cached.timestamp) > ttl;
      }

      // 获取缓存数据（如果过期则返回 null）
      getCachedData(key) {
        if (this.isExpired(key)) {
          return null;
        }
        const cached = this.get(key);
        return cached ? cached.data : null;
      }

      // 清除缓存
      clear(key) {
        try {
          localStorage.removeItem(key);
        } catch (e) {
          console.warn('清除缓存失败:', e);
        }
      }
    }

    // 创建全局缓存管理器实例
    const cacheManager = new CacheManager();

    // API 接口
    const API_BASE = 'https://push2his.eastmoney.com/api/qt/stock/kline/get';
    const API_PARAMS = {
      cb: 'jQuery35108745723541970376_1772087141861',
      secid: '90.BK1158',
      ut: 'fa5fd1943c7b386f172d6893dbfba10b',
      fields1: 'f1,f2,f3,f4,f5,f6',
      fields2: 'f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61',
      klt: '101',
      fqt: '1',
      end: '20500101',
      lmt: '1000000',
      _: Date.now()
    };

    // 静态预测 JSON 目录（无后端）：默认 ./data，可用 ?data= 覆盖
    const STATIC_DATA_BASE = (() => {
      try {
        const u = new URLSearchParams(window.location.search);
        const d = u.get('data');
        if (d && String(d).trim()) return String(d).replace(/\/$/, '');
      } catch (_) {}
      return './data';
    })();

    const IS_FILE_PROTOCOL = window.location.protocol === 'file:';
    const PREDICT_HISTORY_DAYS = 300;
    const PREDICT_CACHE_KEYS = {
      data: 'predictionDataV2',
      evaluation: 'predictionDataEvaluationV2',
      timestamp: 'predictionDataTimestampV2',
      meta: 'predictionDataMetaV2'
    };

    function normalizePredictRows(rows, expectedDays = PREDICT_HISTORY_DAYS) {
      if (!Array.isArray(rows)) return [];
      const normalized = rows
        .filter((item) =>
          item &&
          typeof item.date === 'string' &&
          Number.isFinite(item.prob_t1) &&
          Number.isFinite(item.prob_t5)
        )
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));
      return normalized.slice(-expectedDays);
    }

    function formatPredictHistoryResult(result) {
      const rows = normalizePredictRows(result?.data || []);
      return rows.map((item) => ({
        date: item.date,
        t1Prob: parseFloat((item.prob_t1 * 100).toFixed(2)),
        t5Prob: parseFloat((item.prob_t5 * 100).toFixed(2))
      }));
    }

    function toPredictPayload(raw, source) {
      const series = formatPredictHistoryResult(raw);
      const actualDays = series.length;
      return {
        raw,
        source,
        expectedDays: PREDICT_HISTORY_DAYS,
        actualDays,
        isPartial: actualDays < PREDICT_HISTORY_DAYS,
        series,
        evaluation: raw?.metadata?.evaluation || null
      };
    }

    function loadPredictRawFromLocalCache() {
      try {
        const cachedData = localStorage.getItem(PREDICT_CACHE_KEYS.data);
        const cachedMeta = localStorage.getItem(PREDICT_CACHE_KEYS.meta);
        if (!cachedData) return null;
        let meta = null;
        try {
          meta = cachedMeta ? JSON.parse(cachedMeta) : null;
        } catch (_) {
          meta = null;
        }
        const cacheSource = String(meta?.source || '');
        // 仅接受“真实来源”缓存，避免历史模拟序列持续回灌。
        if (
          cacheSource &&
          !['fetch-json', 'embedded', 'cache-file-fallback', 'local-api'].includes(cacheSource)
        ) {
          return null;
        }
        const parsed = JSON.parse(cachedData);
        if (!Array.isArray(parsed) || !parsed.length) return null;
        const rows = parsed
          .filter((item) =>
            item &&
            typeof item.date === 'string' &&
            Number.isFinite(item.t1Prob) &&
            Number.isFinite(item.t5Prob)
          )
          .map((item) => ({
            date: item.date,
            prob_t1: Number(item.t1Prob) / 100,
            prob_t5: Number(item.t5Prob) / 100
          }));
        if (!rows.length) return null;
        return {
          success: true,
          data: rows,
          metadata: {
            requested_days: PREDICT_HISTORY_DAYS,
            total_days: rows.length,
            embedded_source: 'localStorage predictionDataV2'
          }
        };
      } catch (_) {
        return null;
      }
    }

    /**
     * http(s) 下优先 fetch predict_history_300.json（失败回退 100）；
    * file:// 下直接使用 predict-history.embed.txt 注入的 window.__STATIC_PREDICT_HISTORY__。
     */
    async function loadPredictHistoryRaw() {
      let raw = null;
      let source = 'none';
      let embType = 'undefined';
      let embHasData = false;
      let embDataLen = 0;
      let cacheFallbackUsed = false;
      let localApiTried = false;
      let localApiSuccess = false;
      let localApiLastError = '';
      if (!IS_FILE_PROTOCOL) {
        try {
          const candidates = [
            `${STATIC_DATA_BASE}/predict_history_300.json`,
            `${STATIC_DATA_BASE}/predict_history_100.json`
          ];
          for (const url of candidates) {
            const response = await fetch(url);
            if (!response.ok) continue;
            const j = await response.json();
            if (j && typeof j === 'object' && Array.isArray(j.data) && j.data.length) {
              raw = j;
              source = `fetch-json:${url.split('/').pop()}`;
              break;
            }
          }
        } catch (_) {}
      }
      let metaTotalDays = null;
      if (!raw) {
        const emb = window.__STATIC_PREDICT_HISTORY__;
        embType = typeof emb;
        embHasData = !!(emb && typeof emb === 'object' && Array.isArray(emb.data) && emb.data.length);
        embDataLen = embHasData ? emb.data.length : 0;
        // 根因记录：历史上 file:// 的嵌入脚本可能被外部污染（浏览器报 Unexpected token '%'），
        // 导致 __STATIC_PREDICT_HISTORY__ 为 undefined；此处仅接受有效对象。
        if (emb && typeof emb === 'object' && Array.isArray(emb.data) && emb.data.length) {
          raw = emb;
          source = 'embedded';
          metaTotalDays = Number.isFinite(emb?.metadata?.total_days) ? emb.metadata.total_days : null;
        }
      }
      if (!raw && IS_FILE_PROTOCOL) {
        const cachedRaw = loadPredictRawFromLocalCache();
        if (cachedRaw) {
          raw = cachedRaw;
          source = 'cache-file-fallback';
          cacheFallbackUsed = true;
        }
      }
      // file:// 下若静态嵌入失效，尝试本地后端 API（真实数据，非模拟）。
      if (!raw && IS_FILE_PROTOCOL) {
        localApiTried = true;
        const apiUrls = [
          `http://127.0.0.1:5000/api/predict/history?days=${PREDICT_HISTORY_DAYS}&include_evaluation=true`,
          `http://127.0.0.1:5001/api/predict/history?days=${PREDICT_HISTORY_DAYS}&include_evaluation=true`
        ];
        for (const url of apiUrls) {
          try {
            const response = await fetch(url);
            if (!response.ok) {
              localApiLastError = `${url} status ${response.status}`;
              continue;
            }
            const j = await response.json();
            if (j && typeof j === 'object' && Array.isArray(j.data) && j.data.length) {
              raw = j;
              source = 'local-api';
              localApiSuccess = true;
              break;
            }
            localApiLastError = `${url} payload-invalid`;
          } catch (e) {
            localApiLastError = `${url} ${(e && e.message) ? e.message : 'fetch-failed'}`;
          }
        }
      }
      const payload = raw ? toPredictPayload(raw, source) : null;
      return payload;
    }

    // 解析API数据
    function parseApiData(rawData) {
      try {
        // 处理JSONP响应
        const jsonStr = rawData.replace(/^[^(]+\(|\)$/g, '');
        const data = JSON.parse(jsonStr);
        
        if (data.rc === 0 && data.data && data.data.klines) {
          const klines = data.data.klines;
          const history = [];
          
          for (const kline of klines) {
            const parts = kline.split(',');
            history.push({
              date: parts[0],
              close: parseFloat(parts[2]),
              change_pct: parseFloat(parts[8]),
              amount: parseFloat(parts[6]),
              turnover: parseFloat(parts[10])
            });
          }
          
          // 按日期排序
          history.sort((a, b) => new Date(a.date) - new Date(b.date));
          
          const latest = history[history.length - 1];
          
          return {
            latest,
            history
          };
        }
        return null;
      } catch (error) {
        console.error('解析API数据失败:', error);
        return null;
      }
    }

    // 计算风险评估（修复版 - 与后端逻辑一致）
    function calculateRisk(data) {
      if (!data || !data.history || data.history.length === 0) {
        return {
          risk_level: 3.0,
          downside_probability: 0.4,
          alert: false,
          alert_message: ""
        };
      }
      
      // 基础风险分数（降低至 3.0）
      let riskScore = 3.0;
      
      const latest = data.latest;
      const history = data.history;
      
      // ========== 1. 流动性风险 ==========
      const avgTurnover5d = history.slice(-5).reduce((sum, item) => sum + item.turnover, 0) / Math.min(5, history.length);
      if (avgTurnover5d > 12) {
        riskScore += 2.0;
      } else if (avgTurnover5d > 8) {
        riskScore += 1.0 + (avgTurnover5d - 8) / 4.0;
      } else if (avgTurnover5d > 5) {
        riskScore += (avgTurnover5d - 5) / 3.0;
      }
      
      // ========== 2. 单日暴跌风险（新增）==========
      const dailyChange = latest.change_pct;
      if (dailyChange < -7) {
        riskScore += 2.0;
      } else if (dailyChange < -5) {
        riskScore += 1.5;
      } else if (dailyChange < -3) {
        riskScore += 1.0;
      } else if (dailyChange < -2) {
        riskScore += 0.5;
      }
      
      // ========== 3. 价格趋势风险（双向计算）==========
      const recentChange = history.slice(-5).reduce((sum, item) => sum + item.change_pct, 0);
      
      // 上涨风险
      if (recentChange > 15) {
        riskScore += Math.min(2.0, 1.0 + (recentChange - 15) / 10.0);
      } else if (recentChange > 8) {
        riskScore += (recentChange - 8) / 7.0;
      }
      
      // 下跌风险（新增）
      if (recentChange < -15) {
        riskScore += Math.min(2.0, Math.abs(recentChange) / 10.0);
      } else if (recentChange < -8) {
        riskScore += Math.abs(recentChange) / 10.0;
      } else if (recentChange < -5) {
        riskScore += Math.abs(recentChange) / 15.0;
      }
      
      // ========== 4. 连续下跌风险（新增）==========
      let consecutiveDown = 0;
      for (let i = 0; i < Math.min(5, history.length); i++) {
        if (history[history.length - 1 - i].change_pct < 0) {
          consecutiveDown++;
        } else {
          break;
        }
      }
      
      if (consecutiveDown >= 5) {
        riskScore += 2.0;
      } else if (consecutiveDown >= 3) {
        riskScore += 1.0;
      } else if (consecutiveDown >= 2) {
        riskScore += 0.5;
      }
      
      // ========== 5. 波动率风险 ==========
      const recent20 = history.slice(-20);
      const avgChange20 = recent20.reduce((sum, item) => sum + item.change_pct, 0) / recent20.length;
      const volatility = Math.sqrt(
        recent20.reduce((sum, item) => sum + Math.pow(item.change_pct - avgChange20, 2), 0) / recent20.length
      );
      
      if (volatility > 8) {
        riskScore += 2.0;
      } else if (volatility > 5) {
        riskScore += 1.0 + (volatility - 5) / 3.0;
      } else if (volatility > 3) {
        riskScore += (volatility - 3) / 2.0;
      }

      // 边界值检查
      const normalizedValue = Math.max(-1, Math.min(1, value || 0));
      
      // 计算颜色（PRD 要求：0-30% 绿色、31-70% 黄色、71-100% 红色）
      // value 范围：0-1（百分比）
      const getColor = (val) => {
        const percentage = Math.abs(val) * 100; // 转换为百分比
        if (percentage <= 30) return '#10b981';       // 绿色（低风险）
        if (percentage <= 70) return '#f59e0b';       // 黄色（中风险）
        return '#ef4444';                              // 红色（高风险）
      };

      // 优化尺寸：从 40px 增加到 48px
      const size = 48;
      const strokeWidth = 3.5;
      const radius = (size - strokeWidth) / 2;
      const circumference = 2 * Math.PI * radius;
      
      // 将值映射到圆环进度（0-1 映射到 0-1）
      const progress = Math.abs(normalizedValue);  // 取绝对值
      const offset = circumference - progress * circumference;
      
      const color = getColor(normalizedValue);

      return (
        // 右上角定位
        <div className="absolute top-3 right-3 z-10">
          <div className="relative inline-flex items-center justify-center">
            <svg 
              width={size} 
              height={size} 
              className="transform -rotate-90"
              viewBox={`0 0 ${size} ${size}`}
            >
              {/* 背景轨道 */}
              <circle
                cx={size / 2}
                cy={size / 2}
                r={radius}
                stroke="#E2E8F0"
                strokeWidth={strokeWidth}
                fill="none"
              />
              {/* 进度条 */}
              <circle
                cx={size / 2}
                cy={size / 2}
                r={radius}
                stroke={color}
                strokeWidth={strokeWidth}
                fill="none"
                strokeDasharray={circumference}
                strokeDashoffset={offset}
                strokeLinecap="round"
                style={{ transition: 'stroke-dashoffset 0.3s ease-out' }}
              />
            </svg>
            {/* 中心数值 - 精确居中 */}
            <span 
              className="absolute font-bold"
              style={{ 
                color: color,
                fontSize: '11px',
                top: '50%',
                left: '50%',
                transform: 'translate(-50%, -50%)',

      };

      const levelForProb = (pct) => {
        if (!Number.isFinite(pct)) return { label: '无数据', cls: 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300' };
        if (pct < 30) return { label: '较低', cls: 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' };
        if (pct < 50) return { label: '中等', cls: 'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300' };
        if (pct < 70) return { label: '较高', cls: 'bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300' };
        return { label: '高', cls: 'bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300' };
      };

      const evaluateCalibrationStatus = (bias, ece) => {
        if (!Number.isFinite(bias) || !Number.isFinite(ece)) return 'unknown';
        if (Math.abs(bias) <= 0.05 && ece <= 0.08) return 'normal';
        if (bias < -0.05) return 'underestimate';
        if (bias > 0.05) return 'overestimate';
        return 'normal';
      };

      const calibrationStyle = (status) => {
        if (status === 'underestimate') return { label: '偏低估', cls: 'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300' };
        if (status === 'overestimate') return { label: '偏高估', cls: 'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300' };
        if (status === 'normal') return { label: '正常', cls: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300' };
        return { label: '未知', cls: 'bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300' };
      };

      const alertStyle = (level) => {
        if (level === 'red') return { label: '红色告警', cls: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300' };
        if (level === 'yellow') return { label: '黄色告警', cls: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300' };
        return { label: '无告警', cls: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300' };
      };

      // 静态预测：统一先 fetch predict_history_100.json，失败再用 predict-history.embed.txt 嵌入（file:// 下 fetch 可能被拦截）
      const fetchPredictionData = async () => {
        try {
          const payload = await loadPredictHistoryRaw();
          const ok = !!(payload && payload.actualDays > 0);
          if (ok) return payload;
          return null;
        } catch (err) {
          console.warn('静态预测数据加载失败:', err);
          return null;
        }
      };

      React.useEffect(() => {
        const loadData = async () => {
          setLoading(true);
          setError(null);
          
          try {
            // 检查 localStorage 中是否有缓存的数据
            const cachedData = localStorage.getItem(PREDICT_CACHE_KEYS.data);
            const cachedTimestamp = localStorage.getItem(PREDICT_CACHE_KEYS.timestamp);
            const cachedEvaluation = localStorage.getItem(PREDICT_CACHE_KEYS.evaluation);
            const cachedMeta = localStorage.getItem(PREDICT_CACHE_KEYS.meta);
            
            // 如果有缓存且未过期（24 小时内），使用缓存数据
            if (cachedData && cachedTimestamp) {
              const timestamp = parseInt(cachedTimestamp, 10);
              const now = Date.now();
              const hoursPassed = (now - timestamp) / (1000 * 60 * 60);
              const manifestTimeMs = staticManifest?.generated_at
                ? Date.parse(String(staticManifest.generated_at))
                : NaN;
              const cacheIsOlderThanManifest =
                IS_FILE_PROTOCOL &&
                Number.isFinite(manifestTimeMs) &&
                Number.isFinite(timestamp) &&
                manifestTimeMs > timestamp;
              if (hoursPassed < 24 && !cacheIsOlderThanManifest) {
                const evalComplete = (ev) =>
                  ev &&
                  typeof ev === 'object' &&
                  (ev.t1_ece !== undefined || ev.t1_event_rate !== undefined);
                let parsedEv = null;
                let parsedMeta = null;
                try {
                  parsedEv = cachedEvaluation ? JSON.parse(cachedEvaluation) : null;
                } catch (e) {
                  parsedEv = null;
                }
                try {
                  parsedMeta = cachedMeta ? JSON.parse(cachedMeta) : null;
                } catch (e) {
                  parsedMeta = null;
                }
                const parsedMetaSource = String(parsedMeta?.source || '');
                const unsupportedCacheSource =
                  parsedMetaSource &&
                  !['fetch-json', 'embedded', 'cache-file-fallback', 'local-api'].includes(parsedMetaSource);
                if (unsupportedCacheSource) {
                  try {
                    Object.values(PREDICT_CACHE_KEYS).forEach((key) => localStorage.removeItem(key));
                  } catch (_) {}
                }
                let series = JSON.parse(cachedData);
                let ev = evalComplete(parsedEv) ? parsedEv : null;
                let meta =
                  parsedMeta &&
                  typeof parsedMeta === 'object' &&
                  Number.isFinite(parsedMeta.expectedDays) &&
                  Number.isFinite(parsedMeta.actualDays)
                    ? parsedMeta
                    : {
                        source: 'cache-legacy',
                        expectedDays: PREDICT_HISTORY_DAYS,
                        actualDays: Array.isArray(series) ? series.length : 0,
                        isPartial: !Array.isArray(series) || series.length < PREDICT_HISTORY_DAYS
                      };
                if (unsupportedCacheSource) {
                  series = [];
                  ev = null;
                  meta = {
                    source: 'cache-invalidated',
                    expectedDays: PREDICT_HISTORY_DAYS,
                    actualDays: 0,
                    isPartial: true
                  };
                }
                if (Array.isArray(series) && series.length > 0 && meta.actualDays < PREDICT_HISTORY_DAYS) {
                  const apiData = await fetchPredictionData();
                  if (apiData && apiData.actualDays > series.length) {
                    series = apiData.series;
                    if (apiData.evaluation && evalComplete(apiData.evaluation)) {
                      ev = apiData.evaluation;
                      try {
                        localStorage.setItem(PREDICT_CACHE_KEYS.evaluation, JSON.stringify(ev));
                      } catch (e) {}
                    }
                    meta = {
                      source: apiData.source,
                      expectedDays: apiData.expectedDays,
                      actualDays: apiData.actualDays,
                      isPartial: apiData.isPartial
                    };
                    try {
                      localStorage.setItem(PREDICT_CACHE_KEYS.data, JSON.stringify(series));
                      localStorage.setItem(PREDICT_CACHE_KEYS.timestamp, Date.now().toString());
                      localStorage.setItem(PREDICT_CACHE_KEYS.meta, JSON.stringify(meta));
                    } catch (e) {}
                  }
                }
                if (!evalComplete(ev)) {
                  const apiData = await fetchPredictionData();
                  if (apiData && apiData.evaluation && evalComplete(apiData.evaluation)) {
                    ev = apiData.evaluation;
                    try {
                      localStorage.setItem(PREDICT_CACHE_KEYS.evaluation, JSON.stringify(ev));
                    } catch (e) {}
                  }
                }
                setPredictionData(series);
                setEvaluation(ev);
                setPredictMeta(meta);
                if (meta.isPartial) {
                  setError(`当前仅加载到 ${meta.actualDays}/${meta.expectedDays} 个交易日预测数据。file:// 下请执行 python tools/sync_static_data_from_json.py 后刷新。`);
                }
                setLoading(false);
                return;
              }
            }
            
            // 尝试从 API 获取真实数据
            const apiData = await fetchPredictionData();
            
            let newData = null;
            let newEvaluation = null;
            if (apiData && apiData.series) {
              // API 成功，使用真实数据
              newData = apiData.series;
              newEvaluation = apiData.evaluation || null;
              setPredictMeta({
                source: apiData.source,
                expectedDays: apiData.expectedDays,
                actualDays: apiData.actualDays,
                isPartial: apiData.isPartial
              });
              if (apiData.isPartial) {
                setError(`当前仅加载到 ${apiData.actualDays}/${apiData.expectedDays} 个交易日预测数据。file:// 下请执行 python tools/sync_static_data_from_json.py 后刷新。`);
              } else {
                setError(null);
              }
              console.log('✅ 使用静态预测数据（fetch 或 predict-history.embed.txt）');
            } else {
              // API 失败：不再静默渲染降级模拟概率
              newData = null;
              setPredictMeta(null);
              console.log('⚠️ 静态预测数据获取失败，不渲染降级模拟数据');
              setError(
                IS_FILE_PROTOCOL
                  ? '当前为 file:// 打开：请运行 python tools/sync_static_data_from_json.py（或 export_static_predict_history.py）将完整 predict_history 写入 data/predict-history.embed.txt 后刷新。'
                  : '无法加载静态预测数据：请运行 tools/export_static_predict_history.py 生成 predict_history_100.json 与 predict-history.embed.txt，并确保可访问 data/predict_history_100.json（或执行 python tools/sync_static_data_from_json.py 同步嵌入文件）。'
              );
            }

            setPredictionData(newData);
            setEvaluation(newEvaluation);

            // 仅缓存真实数据，避免把模拟数据/空值缓存成“事实”
            if (newData) {
              localStorage.setItem(PREDICT_CACHE_KEYS.data, JSON.stringify(newData));
              localStorage.setItem(PREDICT_CACHE_KEYS.evaluation, JSON.stringify(newEvaluation || null));
              localStorage.setItem(PREDICT_CACHE_KEYS.timestamp, Date.now().toString());
              localStorage.setItem(PREDICT_CACHE_KEYS.meta, JSON.stringify({
                source: apiData?.source || 'unknown',
                expectedDays: apiData?.expectedDays || PREDICT_HISTORY_DAYS,
                actualDays: apiData?.actualDays || (Array.isArray(newData) ? newData.length : 0),
                isPartial: !!apiData?.isPartial
              }));
            }
            
          } catch (err) {
            console.error('数据加载失败:', err);
            setError('数据加载失败：' + err.message);
            
            // 极端情况下：同样不渲染降级模拟概率
            setPredictionData(null);
            setEvaluation(null);
            setPredictMeta(null);
            
          } finally {
            setLoading(false);
          }
        };
        
        loadData();
      }, [staticManifest?.generated_at]);

      if (loading) {
        return (
          <div className="flex justify-center items-center py-12">
            <div className="text-xl font-bold animate-pulse">加载预测数据中...</div>
          </div>
        );
      }

      const safePredictionData = Array.isArray(predictionData) ? predictionData : [];
      const latest = safePredictionData[safePredictionData.length - 1] || {};
      const trendPointCount = safePredictionData.length || PREDICT_HISTORY_DAYS;
      const t1Prob = Number.isFinite(latest.t1Prob) ? latest.t1Prob : NaN;
      const t5Prob = Number.isFinite(latest.t5Prob) ? latest.t5Prob : NaN;
      const t1Level = levelForProb(t1Prob);
      const t5Level = levelForProb(t5Prob);
      const chartEmptyReason =
        error ||
        (IS_FILE_PROTOCOL
          ? '暂无可用预测数据，请先运行 python tools/sync_static_data_from_json.py 后刷新。'
          : '暂无可用预测数据，请检查 data/predict_history_100.json。');

      const t1PredMean = Number.isFinite(evaluation?.t1_pred_mean)
        ? evaluation.t1_pred_mean
        : Number.isFinite(evaluation?.t1_reliability_bins?.[0]?.pred_mean)
        ? evaluation.t1_reliability_bins[0].pred_mean
        : NaN;
      const t1EventRate = Number.isFinite(evaluation?.t1_event_rate) ? evaluation.t1_event_rate : NaN;
      const t1Ece = Number.isFinite(evaluation?.t1_ece) ? evaluation.t1_ece : NaN;
      const t1Bias = Number.isFinite(evaluation?.t1_bias) ? evaluation.t1_bias : (t1PredMean - t1EventRate);
      const t1Status = calibrationStyle(evaluation?.calibration_status_t1 || evaluateCalibrationStatus(t1Bias, t1Ece));
      const t1Alert = alertStyle(evaluation?.calibration_alert_level_t1 || 'none');

      const t5PredMean = Number.isFinite(evaluation?.t5_pred_mean)
        ? evaluation.t5_pred_mean
        : Number.isFinite(evaluation?.t5_reliability_bins?.[0]?.pred_mean)
        ? evaluation.t5_reliability_bins[0].pred_mean
        : NaN;
      const t5EventRate = Number.isFinite(evaluation?.t5_event_rate) ? evaluation.t5_event_rate : NaN;
      const t5Ece = Number.isFinite(evaluation?.t5_ece) ? evaluation.t5_ece : NaN;
      const t5Bias = Number.isFinite(evaluation?.t5_bias) ? evaluation.t5_bias : (t5PredMean - t5EventRate);
      const t5Status = calibrationStyle(evaluation?.calibration_status_t5 || evaluateCalibrationStatus(t5Bias, t5Ece));
      const t5Alert = alertStyle(evaluation?.calibration_alert_level_t5 || 'none');

      return (
        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-8 custom-card">
          {/* 错误提示：仅在已有趋势数据时展示顶部横幅；无数据时改为图内提示 */}
          {error && safePredictionData.length > 0 && (
            <div className="mb-6 bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-500 p-4 rounded">
              <div className="flex items-start">
                <div className="flex-shrink-0">
                  <svg className="h-5 w-5 text-yellow-500" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                  </svg>
                </div>
                <div className="ml-3">
                  <p className="text-sm text-yellow-700 dark:text-yellow-300">
                    <span className="font-medium">注意：</span>
                    {error}
                  </p>
                </div>
              </div>
            </div>
          )}
          
          <div className="flex items-center mb-8">
            <h3 className="text-xl font-semibold bg-gradient-to-r from-red-600 to-orange-500 bg-clip-text text-transparent">下跌风险预测</h3>
            <span className="ml-3 px-3 py-1 bg-gradient-to-r from-red-100 to-orange-100 dark:from-red-900/30 dark:to-orange-900/30 text-red-600 dark:text-red-400 text-xs font-medium rounded-full custom-badge">
              AI 预测
            </span>
          </div>
          {staticManifest && staticManifest.generated_at && (
            <div className="-mt-4 mb-6 text-xs text-gray-500 dark:text-gray-400">
              静态数据 manifest.generated_at：{String(staticManifest.generated_at)}
            </div>
          )}
          {predictMeta && predictMeta.isPartial && (
            <div className="-mt-2 mb-6 rounded-lg p-3 text-xs border border-amber-200 bg-amber-50 text-amber-800 dark:border-amber-800 dark:bg-amber-900/30 dark:text-amber-300">
              当前仅加载到 {predictMeta.actualDays}/{predictMeta.expectedDays} 个交易日预测数据（source: {predictMeta.source}）。
              请执行 <code>python tools/sync_static_data_from_json.py</code> 后刷新页面。
            </div>
          )}
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            {/* 次日（T+1）预测 */}
            <div className="bg-gradient-to-br from-red-50 to-orange-50 dark:from-red-900/20 dark:to-orange-900/10 rounded-xl p-6 shadow-sm custom-card transform hover:-translate-y-1 transition-transform duration-300">
              <div className="flex justify-between items-center mb-6">
                <h4 className="text-lg font-medium flex items-center">
                  <span className="mr-2 text-red-500">📊</span>
                  次日（T+1）预测
                </h4>
                <div className="flex items-center gap-2">
                  <button 
                    className="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded-lg text-sm flex items-center hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                    onClick={() => setShowT1Formula(true)}
                  >
                    <span className="mr-1">📝</span>
                    计算公式
                  </button>
                  <button
                    className="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded-lg text-sm flex items-center hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                    onClick={handleExportEvaluation}
                    disabled={evalLoading}
                    title="导出 prediction evaluation 的 t1/t5 校准诊断"
                  >
                    {evalLoading ? '导出中...' : '导出校准诊断'}
                  </button>
                </div>
              </div>

              {evalError && (
                <div className="mb-4 bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-500 p-4 rounded">
                  <div className="text-sm text-yellow-700 dark:text-yellow-300">
                    {evalError}
                  </div>
                </div>
              )}
              
              <div className="mb-2 text-xs text-gray-500 dark:text-gray-400">
                预测基准日（与趋势图末点一致）：{latest.date || 'N/A'}
              </div>
              <div className="mb-8">
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white dark:bg-gray-700 rounded-lg p-5 shadow-sm transform hover:scale-105 transition-transform duration-300">
                    <div className="text-sm text-gray-600 dark:text-gray-400 mb-2">下跌概率</div>
                    <div className="text-2xl font-bold text-red-600 dark:text-red-400">{Number.isFinite(t1Prob) ? `${t1Prob.toFixed(1)}%` : 'N/A'}</div>
                    <div className={`inline-block px-3 py-1 text-xs rounded-full mt-2 custom-badge ${t1Level.cls}`}>
                      {Number.isFinite(t1Prob) ? t1Level.label : '无数据'}
                    </div>
                  </div>
                  <div className="bg-white dark:bg-gray-700 rounded-lg p-5 shadow-sm transform hover:scale-105 transition-transform duration-300">
                    <div className="text-sm text-gray-600 dark:text-gray-400 mb-2">校准状态</div>
                    <div className="flex items-center gap-2">
                      <span className={`px-2 py-0.5 rounded text-xs ${t1Status.cls}`}>{t1Status.label}</span>
                      <span className={`px-2 py-0.5 rounded text-xs ${t1Alert.cls}`}>{t1Alert.label}</span>
                    </div>
                    <div className="text-xs text-gray-500 dark:text-gray-400 mt-2">
                      预测均值 {Number.isFinite(t1PredMean) ? `${(t1PredMean * 100).toFixed(1)}%` : 'N/A'} vs 实际发生率 {Number.isFinite(t1EventRate) ? `${(t1EventRate * 100).toFixed(1)}%` : 'N/A'}，校准误差（ECE） {Number.isFinite(t1Ece) ? t1Ece.toFixed(3) : 'N/A'}
                    </div>
                  </div>
                </div>
              </div>
              
              {/* 趋势线图表 */}
              <div className="h-52 mb-6 bg-white dark:bg-gray-700 rounded-lg p-4 shadow-sm">
                <PredictionChart 
                  data={safePredictionData}
                  type="t1Prob" 
                  title={`近${trendPointCount}个交易日次日下跌概率趋势`}
                  color="#ef4444"
                  emptyReason={chartEmptyReason}
                />
              </div>
              
              {/* 判断逻辑 */}
              <div className="bg-white dark:bg-gray-700 rounded-lg p-5 shadow-sm">
                <div className="flex items-center mb-4">
                  <span className="mr-2 text-blue-500">❓</span>
                  <h5 className="font-medium">客观判断依据</h5>
                </div>
                <ul className="text-sm space-y-2">
                  <li className="flex items-start">
                    <span className="text-red-500 mr-2 mt-1">•</span>
                    <span>卡片概率 = 最新预测点；校准区对比“预测均值”与历史“实际发生率”，辅助判断绝对概率是否可信。</span>
                  </li>
                  <li className="flex items-start">
                    <span className="text-red-500 mr-2 mt-1">•</span>
                    <span>黄/红告警时优先看趋势变化，勿单独押注单点百分比。</span>
                  </li>
                </ul>
              </div>
            </div>
            
            {/* 5日内（T+5）预测 */}
            <div className="bg-gradient-to-br from-purple-50 to-indigo-50 dark:from-purple-900/20 dark:to-indigo-900/10 rounded-xl p-6 shadow-sm custom-card transform hover:-translate-y-1 transition-transform duration-300">
              <div className="flex justify-between items-center mb-6">
                <h4 className="text-lg font-medium flex items-center">
                  <span className="mr-2 text-purple-500">📈</span>
                  5日内（T+5）预测
                </h4>
                <button

                  onClick={() => setShowT5Formula(true)}
                >
                  <span className="mr-1">📝</span>
                  计算公式
                </button>
              </div>
              
              <div className="mb-2 text-xs text-gray-500 dark:text-gray-400">
                预测基准日（与趋势图末点一致）：{latest.date || 'N/A'}
              </div>
              <div className="mb-8">
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white dark:bg-gray-700 rounded-lg p-5 shadow-sm transform hover:scale-105 transition-transform duration-300">
                    <div className="text-sm text-gray-600 dark:text-gray-400 mb-2">下跌概率</div>
                    <div className="text-2xl font-bold text-purple-600 dark:text-purple-400">{Number.isFinite(t5Prob) ? `${t5Prob.toFixed(1)}%` : 'N/A'}</div>
                    <div className={`inline-block px-3 py-1 text-xs rounded-full mt-2 custom-badge ${t5Level.cls}`}>
                      {Number.isFinite(t5Prob) ? t5Level.label : '无数据'}
                    </div>
                  </div>
                  <div className="bg-white dark:bg-gray-700 rounded-lg p-5 shadow-sm transform hover:scale-105 transition-transform duration-300">

                    <div className="flex items-center gap-2">

                    </div>

              {/* 趋势线图表 */}

              {/* 判断逻辑 */}

                  <span className="mr-2 text-blue-500">❓</span>
                  <h5 className="font-medium">客观判断依据</h5>
                </div>
                <ul className="text-sm space-y-2">

                    <span>与 T+1 相同：最新点驱动卡片与曲线；校准口径见“预测均值 / 实际发生率 / 校准误差（ECE）”。</span>
                  </li>
                  <li className="flex items-start">
                    <span className="text-purple-500 mr-2 mt-1">•</span>
                    <span>告警阈值：黄 ECE&gt;0.10；红 ECE&gt;0.15 或 |bias|&gt;0.12（与接口文档一致）。</span>

          {/* 风险提示 */}

            <span className="font-medium">风险提示：</span>
            以上预测基于历史数据统计和当前风险因子分析，仅供参考，不构成投资建议。投资有风险，入市需谨慎。
          </div>

      );
    };

    const ENABLE_RISK_RUNTIME_LOGS = false;
    const riskDebugLog = (...args) => {
      if (ENABLE_RISK_RUNTIME_LOGS) {
        console.log(...args);
      }
    };

    // 风险趋势图表组件
    const RiskTrendChart = ({ data }) => {
      const chartRef = React.useRef(null);
      
      // 数据验证和格式化
      const validateAndFormatData = (rawData) => {
        riskDebugLog('[RiskTrendChart] 原始数据:', rawData);
        
        if (!rawData || !Array.isArray(rawData)) {
          console.error('[RiskTrendChart] 数据格式错误：不是数组');
          return [];
        }
        
        if (rawData.length === 0) {
          console.warn('[RiskTrendChart] 数据为空数组');
          return [];
        }
        
        // 验证并格式化数据
        const formattedData = rawData.map((item, index) => {
          // 检查必需字段
          if (!item.date || item.risk_score === undefined) {
            console.error(`[RiskTrendChart] 第${index}条数据缺少必需字段`);
            return null;
          }
          
          // 确保 risk_score 是数字，并保留 2 位小数
          const riskScore = parseFloat(parseFloat(item.risk_score).toFixed(2));
          if (isNaN(riskScore)) {
            console.error(`[RiskTrendChart] 第${index}条数据的 risk_score 不是数字:`, item.risk_score);
            return null;
          }
          
          return {
            date: item.date,
            risk_score: riskScore,  // 已保留 2 位小数
            risk_level: item.risk_level || 'unknown'
          };
        }).filter(item => item !== null);
        
        riskDebugLog('[RiskTrendChart] 格式化后的数据:', formattedData);
        riskDebugLog('[RiskTrendChart] 有效数据条数:', formattedData.length);
        
        return formattedData;
      };
      
      // 辅助函数：风险等级文本
      const getRiskLevelText = (score) => {
        if (score <= 3) return '低风险';
        if (score <= 5) return '中等风险';
        if (score <= 7) return '较高风险';
        return '高风险';
      };
      
      // 辅助函数：风险等级颜色
      const getRiskColor = (score) => {
        if (score <= 3) return '#10b981';
        if (score <= 5) return '#fbbf24';
        if (score <= 7) return '#fb923c';
        return '#ef4444';
      };
      
      React.useEffect(() => {
        riskDebugLog('[RiskTrendChart] useEffect 触发，data:', data);
        
        // 验证和格式化数据
        const formattedData = validateAndFormatData(data);
        
        // 检查 DOM 元素是否存在
        if (!chartRef.current) {
          console.error('[RiskTrendChart] chartRef.current 为 null，DOM 元素未挂载');
          return;
        }
        
        if (!formattedData || formattedData.length === 0) {
          console.warn('[RiskTrendChart] 没有有效数据可渲染');
          return;
        }
        
        riskDebugLog('[RiskTrendChart] 开始初始化图表...');
        
        try {
          // 销毁现有图表实例
          const existingChart = echarts.getInstanceByDom(chartRef.current);
          if (existingChart) {
            existingChart.dispose();
          }
          
          // 确保 DOM 元素仍然存在
          if (!chartRef.current) {
            console.error('[RiskTrendChart] 在销毁图表后，DOM 元素已不存在');
            return;
          }
          
          const chart = echarts.init(chartRef.current);
          riskDebugLog('[RiskTrendChart] 图表实例创建成功');
          
          const option = {
            title: {
              text: '历史风险等级趋势',
              left: 'center',
              top: 15,  // 增加标题与顶部距离
              textStyle: {
                fontSize: 18,  // 增大字号
                fontWeight: 'bold',  // 加粗
                color: '#1f2937'  // 使用深灰色，更柔和
              }
            },
            
            tooltip: {
              trigger: 'axis',
              formatter: (params) => {
                const item = formattedData[params[0].dataIndex];
                // 确保显示 2 位小数
                const riskScoreDisplay = Number(item.risk_score).toFixed(2);
                return `
                  <div style="padding: 8px;">
                    <div style="font-weight: 600; margin-bottom: 4px;">
                      ${item.date}
                    </div>
                    <div>风险打分：${riskScoreDisplay}</div>
                    <div style="color: ${getRiskColor(item.risk_score)}">
                      风险等级：${getRiskLevelText(item.risk_score)}
                    </div>
                  </div>
                `;
              }
            },
            
            xAxis: {
              type: 'category',
              data: formattedData.map(item => item.date),
              boundaryGap: false,
              axisLabel: {
                rotate: 0,  // 改为水平显示
                interval: 'auto',  // 自动计算显示间隔，避免重叠
                margin: 10,  // 增加标签与底部距离
                fontSize: 11,  // 稍微缩小字号，增加可读性
                color: '#6b7280'  // 使用柔和的灰色
              }
            },
            
            yAxis: {
              type: 'value',
              min: (value) => {
                // 计算最小值，向下取整并留出 10% 空间
                const min = Math.min(...formattedData.map(item => item.risk_score));
                const padding = (Math.max(...formattedData.map(item => item.risk_score)) - min) * 0.1 || 1;
                return Math.max(0, Math.floor(min - padding));
              },
              max: (value) => {
                // 计算最大值，向上取整并留出 10% 空间
                const max = Math.max(...formattedData.map(item => item.risk_score));
                const padding = (max - Math.min(...formattedData.map(item => item.risk_score))) * 0.1 || 1;
                return Math.ceil(max + padding);
              },
              interval: 1,
              name: '风险打分',
              axisLabel: {
                formatter: (value) => {
                  // 确保 Y 轴标签显示 2 位小数
                  return Number(value).toFixed(2);
                }
              },
              splitLine: {
                lineStyle: { type: 'dashed' }
              }
            },
            
            series: [{
              name: '风险打分',
              type: 'line',
              smooth: true,
              symbol: 'circle',
              symbolSize: 6,
              data: formattedData.map(item => item.risk_score),
              lineStyle: {
                color: '#dc2626',
                width: 2
              },
              itemStyle: {
                color: '#dc2626'
              },
              areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: 'rgba(220, 38, 38, 0.5)' },

            grid: {
              left: '5%',  // 增加左侧边距

              top: '80px',  // 增加顶部空间，标题不再贴边
              containLabel: true
            }
          };
          
          riskDebugLog('[RiskTrendChart] 设置图表配置...');
          chart.setOption(option);
          riskDebugLog('[RiskTrendChart] 图表渲染完成');
          
          const handleResize = () => {
            if (chartRef.current) {
              const chartInstance = echarts.getInstanceByDom(chartRef.current);
              if (chartInstance) {
                chartInstance.resize();
              }
            }
          };
          window.addEventListener('resize', handleResize);
          
          return () => {
            riskDebugLog('[RiskTrendChart] 清理图表实例');
            window.removeEventListener('resize', handleResize);
            if (chartRef.current) {
              const chartInstance = echarts.getInstanceByDom(chartRef.current);
              if (chartInstance) {
                chartInstance.dispose();
              }
            }

        } catch (error) {
          console.error('[RiskTrendChart] 图表初始化失败:', error);

      riskDebugLog('[RiskTrendChart] 渲染组件，data:', data);
      return React.createElement('div', { ref: chartRef, className: 'w-full h-full' });

    // TabChart 组件 - 价格指数和成交量切换
    const TabChart = ({ data }) => {
      const [activeTab, setActiveTab] = React.useState('price');
      
      // 使用惰性初始化，优先从缓存加载数据
      const [riskData, setRiskData] = React.useState(() => {
        try {
          // 优先使用静态 JSON 文件数据
          riskDebugLog('[RiskTab] 初始化：尝试加载静态数据...');
          return null; // 初始为 null，通过 useEffect 加载静态数据
        } catch (e) {
          console.error('[RiskTab] 初始化：读取缓存失败:', e);
        }
        return null;
      });
      
      const [riskLoading, setRiskLoading] = React.useState(false);
      const [hasRequested, setHasRequested] = React.useState(false);  // 防止重复请求

      const RISK_HISTORY_CACHE_KEY = 'riskHistoryData';
      const RISK_HISTORY_CACHE_TS_KEY = 'riskHistoryTimestamp';
      const RISK_HISTORY_CACHE_VERSION_KEY = 'riskHistoryVersion';
      const RISK_HISTORY_CACHE_VERSION = 'risk-v2-2dp';

      const toRiskScore2dp = React.useCallback((value, fallback = 5.0) => {
        const n = Number(value);
        if (!Number.isFinite(n)) return Number(fallback.toFixed(2));
        return Number(n.toFixed(2));
      }, []);

      const getRiskLevelByScore = React.useCallback((score) => {
        if (score <= 3) return 'low';
        if (score <= 5) return 'medium';
        if (score <= 7) return 'high';
        return 'very_high';
      }, []);

      // 兼容多种输入源：后端风险接口、静态风险文件、旧缓存和行情降级数据
      const normalizeRiskScores = React.useCallback(async (rawData, sourceTag = 'unknown') => {
        const list = Array.isArray(rawData)
          ? rawData
          : (rawData && Array.isArray(rawData.data) ? rawData.data : []);

        const normalized = list
          .map((item) => {
            if (!item || !item.date) return null;

            if (item.risk_score !== undefined && item.risk_score !== null) {
              const riskScore = toRiskScore2dp(item.risk_score);
              return {
                date: item.date,
                risk_score: riskScore,
                risk_level: item.risk_level || getRiskLevelByScore(riskScore),
                source: item.source || sourceTag
              };
            }

            // 兜底：仅当缺少 risk_score 时才根据行情字段近似估算
            const changePercent = Number(item.change_pct ?? item.change_percent ?? 0);
            const volumeRatio = Number(item.volume_ratio ?? 1);
            const amplitude = Number(item.amplitude ?? 0);

            let fallbackRisk = 5.0;
            if (Number.isFinite(changePercent)) {
              fallbackRisk += changePercent < 0
                ? Math.min(3.0, Math.abs(changePercent) * 0.1)
                : -Math.min(2.0, changePercent * 0.1);
            }
            if (Number.isFinite(volumeRatio)) {
              if (volumeRatio > 1.5) fallbackRisk += Math.min(1.5, (volumeRatio - 1.5) * 0.3);
              else if (volumeRatio < 0.7) fallbackRisk += Math.min(1.0, (0.7 - volumeRatio) * 0.2);
            }
            if (Number.isFinite(amplitude) && amplitude > 5) {
              fallbackRisk += Math.min(2.0, (amplitude - 5) * 0.15);
            }
            fallbackRisk = Math.max(0, Math.min(10, fallbackRisk));

            const riskScore = toRiskScore2dp(fallbackRisk);
            return {
              date: item.date,
              risk_score: riskScore,
              risk_level: getRiskLevelByScore(riskScore),
              source: sourceTag
            };
          })
          .filter(Boolean);

        riskDebugLog('[RiskTab] 风险打分标准化完成，条数:', normalized.length, 'source:', sourceTag);
        if (normalized.length > 0) {
          riskDebugLog('[RiskTab] 数值范围：min=', Math.min(...normalized.map(r => r.risk_score)), 'max=', Math.max(...normalized.map(r => r.risk_score)));
        }
        return normalized;
      }, [getRiskLevelByScore, toRiskScore2dp]);

      // 获取风险数据的函数
      const fetchRiskData = React.useCallback(async (showLoading = false) => {
        try {
          riskDebugLog('[RiskTab] 开始获取风险数据...');
          
          if (showLoading) {
            setRiskLoading(true);
          }
          
          // 1. 优先尝试读取浏览器缓存（带版本校验）
          riskDebugLog('[RiskTab] 尝试读取 localStorage 缓存...');
          const cachedData = localStorage.getItem(RISK_HISTORY_CACHE_KEY);
          const cachedTimestamp = localStorage.getItem(RISK_HISTORY_CACHE_TS_KEY);
          const cachedVersion = localStorage.getItem(RISK_HISTORY_CACHE_VERSION_KEY);
          
          if (cachedData && cachedTimestamp && cachedVersion === RISK_HISTORY_CACHE_VERSION) {
            const timestamp = parseInt(cachedTimestamp);
            const now = Date.now();
            const hoursPassed = (now - timestamp) / (1000 * 60 * 60);
            
            // 缓存有效期 24 小时
            if (hoursPassed < 24) {
              riskDebugLog('[RiskTab] 使用缓存数据，已过去', hoursPassed.toFixed(2), '小时');
              const parsedData = JSON.parse(cachedData);

              const riskScores = await normalizeRiskScores(parsedData, 'cache');
              setRiskData(riskScores);
              setRiskLoading(false);
              return;
            } else {
              riskDebugLog('[RiskTab] 缓存已过期');
              localStorage.removeItem(RISK_HISTORY_CACHE_KEY);
              localStorage.removeItem(RISK_HISTORY_CACHE_TS_KEY);
              localStorage.removeItem(RISK_HISTORY_CACHE_VERSION_KEY);
            }
          } else if (cachedData || cachedTimestamp || cachedVersion) {
            riskDebugLog('[RiskTab] 检测到旧缓存版本，执行清理');
            localStorage.removeItem(RISK_HISTORY_CACHE_KEY);
            localStorage.removeItem(RISK_HISTORY_CACHE_TS_KEY);
            localStorage.removeItem(RISK_HISTORY_CACHE_VERSION_KEY);
          }

          // 2. 后端权威接口优先
          const apiUrls = [
            'http://127.0.0.1:5000/api/risk/history?days=300',
            'http://127.0.0.1:5001/api/risk/history?days=300'
          ];
          for (const apiUrl of apiUrls) {
            try {
              const response = await fetch(apiUrl);
              if (!response.ok) continue;
              const json = await response.json();
              if (json && json.success && Array.isArray(json.data) && json.data.length) {
                const riskScores = await normalizeRiskScores(json.data, 'backend-live');
                setRiskData(riskScores);
                localStorage.setItem(RISK_HISTORY_CACHE_KEY, JSON.stringify(riskScores));
                localStorage.setItem(RISK_HISTORY_CACHE_TS_KEY, Date.now().toString());
                localStorage.setItem(RISK_HISTORY_CACHE_VERSION_KEY, RISK_HISTORY_CACHE_VERSION);
                setRiskLoading(false);
                return;
              }
            } catch (apiErr) {
              riskDebugLog('[RiskTab] 后端风险接口不可用:', apiErr?.message || apiErr);
            }
          }

          // 3. 后端不可用时尝试加载静态 JSON 文件数据
          riskDebugLog('[RiskTab] 尝试加载静态数据文件...');
          try {
            const staticResponse = await fetch('./risk_history_data.json');
            if (staticResponse.ok) {
              const staticData = await staticResponse.json();
              riskDebugLog('[RiskTab] 静态数据加载成功，条数:', staticData.length);

              const riskScores = await normalizeRiskScores(staticData, 'static-file');
              setRiskData(riskScores);
              
              // 更新缓存
              localStorage.setItem(RISK_HISTORY_CACHE_KEY, JSON.stringify(riskScores));
              localStorage.setItem(RISK_HISTORY_CACHE_TS_KEY, Date.now().toString());
              localStorage.setItem(RISK_HISTORY_CACHE_VERSION_KEY, RISK_HISTORY_CACHE_VERSION);
              riskDebugLog('[RiskTab] 数据已缓存');
              
              setRiskLoading(false);
              return;
            } else {
              riskDebugLog('[RiskTab] 静态文件不存在 (404)');
            }
          } catch (staticErr) {
            riskDebugLog('[RiskTab] 静态文件不可用');
          }
          
          // 4. 最终降级方案：使用行情数据本地估算
          riskDebugLog('[RiskTab] 使用模拟数据...');
          const mockData = data || [];
          if (mockData.length > 0) {
            const riskScores = await normalizeRiskScores(mockData, 'fallback-local');
            setRiskData(riskScores);
            
            // 更新缓存
            localStorage.setItem(RISK_HISTORY_CACHE_KEY, JSON.stringify(riskScores));
            localStorage.setItem(RISK_HISTORY_CACHE_TS_KEY, Date.now().toString());
            localStorage.setItem(RISK_HISTORY_CACHE_VERSION_KEY, RISK_HISTORY_CACHE_VERSION);
          }
          
          setRiskLoading(false);
        } catch (err) {
          console.error('[RiskTab] 风险数据获取失败:', err);
          setRiskLoading(false);
        }
      }, [data, normalizeRiskScores]);

      // 获取风险数据（只跟随 tab 切换触发，避免依赖项抖动造成更新深度循环）
      React.useEffect(() => {
        riskDebugLog('[RiskTab] useEffect 触发，activeTab:', activeTab, 'riskData:', riskData ? '有缓存' : '无缓存');

        if (activeTab !== 'risk') {
          setHasRequested((prev) => {
            if (!prev) return prev;
            return false;
          });
          return;
        }

        setHasRequested((prev) => {
          if (prev) return prev;
          return true;
        });
        fetchRiskData(!riskData);
      }, [activeTab, fetchRiskData]);

      return (
        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-8 custom-card">
          {/* Tab标签栏 */}
          <div className="flex border-b border-gray-200 dark:border-gray-700 mb-6">
            <button
              className={`px-6 py-3 font-medium transition-all duration-300 relative ${activeTab === 'price' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400'}`}
              onClick={() => setActiveTab('price')}
            >
              价格指数
              {activeTab === 'price' && (
                <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full"></span>
              )}
            </button>
            <button
              className={`px-6 py-3 font-medium transition-all duration-300 relative ${activeTab === 'volume' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400'}`}
              onClick={() => setActiveTab('volume')}
            >
              成交量
              {activeTab === 'volume' && (
                <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full"></span>
              )}
            </button>
            <button
              className={`px-6 py-3 font-medium transition-all duration-300 relative ${activeTab === 'risk' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400'}`}
              onClick={() => setActiveTab('risk')}
            >
              风险趋势
              {activeTab === 'risk' && (
                <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full"></span>
              )}
            </button>
          </div>
          
          {/* 图表内容 */}
          <div className="h-[500px] rounded-lg overflow-hidden shadow-inner bg-gray-50 dark:bg-gray-900/50">
            {activeTab === 'price' ? (
              <PriceChart key={`price-${data?.length || 0}`} data={data} />
            ) : activeTab === 'volume' ? (
              <TurnoverChart key={`volume-${data?.length || 0}`} data={data} />
            ) : riskData ? (
              // 有数据（缓存或新数据）直接显示
              <RiskTrendChart data={riskData} />
            ) : riskLoading ? (
              // 无缓存且正在加载
              <div className="flex flex-col items-center justify-center h-full">
                <div className="text-gray-500 mb-2 font-medium">风险趋势历史数据正在计算中...</div>
                <div className="text-xs text-gray-400">请稍候，系统正在根据缓存数据分析风险趋势</div>
              </div>
            ) : (
              // 无缓存且加载失败
              <div className="flex flex-col items-center justify-center h-full">
                <div className="text-gray-500 mb-2">数据加载失败，请刷新重试</div>
                <div className="text-xs text-gray-400">提示：缓存数据不可用，请尝试录入数据</div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // 预测概率 Y 轴：按数据动态范围（0–100 内），上下留约 12% 边距
    function computeProbabilityYAxisRange(values) {
      var vals = values.filter(function (v) { return typeof v === 'number' && isFinite(v); });
      if (!vals.length) return { min: 0, max: 100 };
      var vmin = Math.min.apply(null, vals);
      var vmax = Math.max.apply(null, vals);
      var span = Math.max(vmax - vmin, 1e-6);
      var pad = Math.max(span * 0.12, 0.5);
      var min = vmin - pad;
      var max = vmax + pad;
      min = Math.max(0, min);
      max = Math.min(100, max);
      if (max - min < 2) {
        var mid = (vmin + vmax) / 2;
        min = Math.max(0, mid - 1);
        max = Math.min(100, mid + 1);
        if (max <= min) max = Math.min(100, min + 2);
      }
      return { min: min, max: max };
    }

    // 预测趋势线图表组件
    const PredictionChart = ({ data, type, title, color = '#ef4444', emptyReason = '暂无预测数据' }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current) return;

        // 销毁现有图表
        if (chartInstance.current) {
          chartInstance.current.dispose();
        }

        chartInstance.current = echarts.init(chartRef.current);
        const hasData = Array.isArray(data) && data.length > 0;

        if (!hasData) {
          chartInstance.current.setOption({
            title: {
              text: title,
              left: 'center',
              textStyle: {

    // 主应用组件
    function App() {
      const [data, setData] = React.useState(null);

      const [showRiskFormula, setShowRiskFormula] = React.useState(false);
      const [showDataEntry, setShowDataEntry] = React.useState(false);  // 数据录入弹窗
      const [latestData, setLatestData] = React.useState(null);

      // 生成模拟的最近一天实际数据
      const generateLatestData = () => {
        return {
          date: new Date().toISOString().split('T')[0],
          X1: parseFloat((Math.random() * 0.05 + 0.01).toFixed(4)), // 相对流动性
          X2: parseFloat((Math.random() * 5 + 1).toFixed(2)), // 当日换手率
          X3: parseFloat((Math.random() * 2 - 1).toFixed(2)), // 换手率变化
          X4: parseFloat((Math.random() * 30 + 10).toFixed(2)), // 量化成交额占比
          X5: parseFloat((Math.random() * 40 + 10).toFixed(2)), // 股东质押率
          X6: parseFloat((Math.random() * 20 - 10).toFixed(2)), // 融资余额变化率
          X7: parseFloat((Math.random() * 100).toFixed(2)), // PE中位数
          X8: parseFloat((Math.random() * 50 - 10).toFixed(2)), // 净利润同比增速
          X9: parseFloat((Math.random() * 20).toFixed(2)), // 退市风险敞口
          X10: Math.random() > 0.7 ? 1 : 0, // 政策虚拟变量
          X11: Math.random() > 0.8 ? 1 : 0, // 财报窗口期虚拟变量
          X12: parseFloat((Math.random() * 5 - 2).toFixed(2)), // 剩余流动性
          X13: parseFloat((Math.random() * 10 + 45).toFixed(2)), // 制造业PMI
          X14: parseFloat((Math.random() * 10 - 5).toFixed(2)), // 前1日涨跌幅
          X15: parseFloat((Math.random() * 20 - 10).toFixed(2)), // 前5日累计涨跌幅
          alpha: parseFloat((Math.random() * 2 - 1).toFixed(4)), // 截距项
          betas: Array.from({ length: 15 }, () => parseFloat((Math.random() * 2 - 1).toFixed(4))) // 系数
        };
      };

      // 生成模拟数据（使用固定种子，确保数据一致性）
      const seededRandom = (seed) => {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
      };

      const generateMockData = (length, referencePrice = 1500) => {
        const mockData = [];
        const today = new Date();
        let currentPrice = referencePrice;
        
        for (let i = length - 1; i >= 0; i--) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          const dateStr = date.toISOString().split('T')[0];
          
          // 使用日期作为种子，确保同一日期生成相同数据
          const seed = parseInt(dateStr.replace(/-/g, ''));
          
          // 生成有波动的价格（随机游走算法，日波动 -2% 至 +2%）
          const dailyChange = (seededRandom(seed) - 0.5) * 0.04; // -2% 至 +2%
          currentPrice = currentPrice * (1 + dailyChange);
          
          // 确保价格在合理范围内（基准价格的 50%-150%）
          currentPrice = Math.max(referencePrice * 0.5, Math.min(referencePrice * 1.5, currentPrice));
          
          mockData.push({
            date: dateStr,
            close: parseFloat(currentPrice.toFixed(2)),
            change_pct: parseFloat(((seededRandom(seed + 1000) - 0.5) * 4).toFixed(2)), // -2% 至 +2%
            amount: parseFloat((seededRandom(seed + 2000) * 10000000000).toFixed(2)),
            turnover: parseFloat((seededRandom(seed + 3000) * 10).toFixed(2))
          });
        }
        
        return mockData;
      };

      // 缓存数据
      const cacheData = (data) => {
        try {
          localStorage.setItem('priceDataCache', JSON.stringify({
            data: data,
            timestamp: Date.now()
          }));
        } catch (e) {
          console.warn('缓存数据失败:', e);
        }
      };

      // 获取缓存数据（1 分钟内有效）
      const getCachedData = () => {
        try {
          const cached = localStorage.getItem('priceDataCache');
          if (!cached) return null;
          
          const { data, timestamp } = JSON.parse(cached);
          const secondsPassed = (Date.now() - timestamp) / 1000;
          
          // 只使用 1 分钟内的缓存
          return secondsPassed < 60 ? data : null;
        } catch (e) {
          console.warn('读取缓存失败:', e);
          return null;
        }
      };

      // 验证数据波动性
      const checkDataVolatility = (data) => {
        if (!data || data.length < 2) return false;
        
        const prices = data.map(item => item.close);
        const uniquePrices = [...new Set(prices)];
        
        // 规则 1：检查是否所有值都相同
        if (uniquePrices.length === 1) {
          return false;
        }
        
        // 规则 2：检查价格波动率
        const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
        const priceRange = Math.max(...prices) - Math.min(...prices);
        const volatility = priceRange / avgPrice;
        
        // 正常波动率应该 > 1%
        if (volatility < 0.01) {
          return false;
        }
        
        // 规则 3：检查相邻 K 线的波动是否在合理范围内（-20% 至 +20%）
        for (let i = 1; i < prices.length; i++) {
          const change = (prices[i] - prices[i-1]) / prices[i-1];
          if (change < -0.2 || change > 0.2) {
            return false;
          }
        }
        
        return true;
      };

      // 完整的数据验证
      const validateHistoryData = (history) => {
        // 1. 基础验证
        if (!history || !Array.isArray(history) || history.length === 0) {
          return { isValid: false, reason: '数据为空' };
        }
        
        // 2. 数据结构验证
        const hasValidStructure = history.every(item => 
          item && typeof item === 'object' && 
          typeof item.close === 'number' &&
          !isNaN(item.close) &&
          isFinite(item.close)
        );
        
        if (!hasValidStructure) {
          return { isValid: false, reason: '数据结构错误' };
        }
        
        // 3. 波动性验证
        if (!checkDataVolatility(history)) {
          return { isValid: false, reason: '数据波动性异常' };
        }
        
        return { isValid: true, reason: '验证通过' };
      };

      // Toast 提示
      const showToast = (message, type = 'info') => {

        // 3 秒后自动消失

      const loadData = async () => {

          // 2. 缓存没有，尝试加载静态 JSON 数据文件

        } catch (err) {
          console.error('[首页] 数据加载失败:', err);
          setError('加载数据失败');
          setLoading(false);
        }
      };

      const handleRefresh = async () => {
        try {
          await fetch('http://127.0.0.1:5000/api/refresh', { method: 'POST' });

      // 数据录入保存功能
      const handleDataEntrySave = (entryData, isBatch = false) => {
        try {
          console.log('[数据录入] 保存数据，批量模式:', isBatch);
          
          if (isBatch) {
            // 批量模式：直接保存整个数组

            console.log('[数据录入] 批量保存，数据条数:', entryData.length);
            
            // 验证并格式化批量数据，支持多种字段格式
            const formattedData = entryData.map(item => {

                volume: parseFloat(item.volume) || 0,

            }).filter(item => item.date && item.close);
            
            // 按日期排序

            setData(parsedData);
            const riskData = calculateRisk(parsedData);

          } else {
            // 单条模式：原有逻辑
            console.log('[数据录入] 单条保存数据:', entryData);
            
            // 验证数据
            if (!entryData.date || !entryData.close || !entryData.change_pct) {
              showToast('请填写必填字段（日期、收盘价、涨跌幅）', 'error');
              return false;

            // 构建完整数据对象
            const newData = {
              date: entryData.date,
              close: parseFloat(entryData.close) || 0,
              change_pct: parseFloat(entryData.change_pct) || 0,
              amount: parseFloat(entryData.amount) || 0,
              turnover: parseFloat(entryData.turnover) || 0
            };
            
            console.log('[数据录入] 格式化后的数据:', newData);
            
            // 更新当前显示的数据
            const updatedHistory = data.history ? [...data.history] : [];
            
            // 查找是否已存在相同日期的数据
            const existingIndex = updatedHistory.findIndex(item => item.date === newData.date);
            
            if (existingIndex !== -1) {
              // 更新现有数据
              updatedHistory[existingIndex] = newData;
              console.log('[数据录入] 更新现有记录，索引:', existingIndex);
            } else {
              // 添加新数据
              updatedHistory.push(newData);
              console.log('[数据录入] 添加新记录');
            }
            
            // 按日期排序
            updatedHistory.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // 更新状态
            const latest = updatedHistory[updatedHistory.length - 1];
            const parsedData = {
              latest,
              history: updatedHistory
            };
            
            setData(parsedData);
            const riskData = calculateRisk(parsedData);
            setRisk(riskData);
            setLatestData(generateLatestData());
            setLastUpdateTime(new Date().toLocaleString());
            
            // 保存到本地文件（通过后端 API）
            saveDataToFile(updatedHistory);
            
            showToast('数据保存成功！', 'success');
            setShowDataEntry(false);
            return true;
          }
        } catch (err) {
          console.error('[数据录入] 保存失败:', err);
          showToast('保存失败：' + err.message, 'error');
          return false;
        }
      };

      // 保存到浏览器缓存
      const saveDataToCache = (historyData) => {
        try {
          console.log('[数据录入] 保存到浏览器缓存，数据条数:', historyData.length);
          
          // 保存到 localStorage
          const timestamp = Date.now();
          localStorage.setItem('indexHistoryData', JSON.stringify(historyData));
          localStorage.setItem('indexHistoryTimestamp', timestamp.toString());
          
          console.log('[数据录入] 缓存保存成功，时间戳:', timestamp);
          showToast('数据已保存到浏览器缓存', 'success');
          return true;
        } catch (err) {
          console.error('[数据录入] 缓存保存失败:', err);
          showToast('缓存保存失败：' + err.message, 'error');
          return false;
        }
      };

      // 从浏览器缓存读取数据
      const loadCacheData = () => {
        try {
          const cachedData = localStorage.getItem('indexHistoryData');
          const cachedTimestamp = localStorage.getItem('indexHistoryTimestamp');
          
          if (cachedData && cachedTimestamp) {
            const timestamp = parseInt(cachedTimestamp);
            const now = Date.now();
            const hoursPassed = (now - timestamp) / (1000 * 60 * 60);
            
            console.log('[缓存读取] 找到缓存数据，已过去', hoursPassed.toFixed(2), '小时');
            return {
              data: JSON.parse(cachedData),
              timestamp: timestamp,
              hoursPassed: hoursPassed
            };
          }
          
          console.log('[缓存读取] 无缓存数据');
          return null;
        } catch (err) {
          console.error('[缓存读取] 读取失败:', err);
          return null;
        }
      };

      // 清空浏览器缓存
      const clearCache = () => {
        try {
          localStorage.removeItem('indexHistoryData');
          localStorage.removeItem('indexHistoryTimestamp');
          console.log('[缓存管理] 缓存已清空');
          showToast('浏览器缓存已清空', 'success');
          return true;
        } catch (err) {
          console.error('[缓存管理] 清空缓存失败:', err);
          showToast('清空缓存失败：' + err.message, 'error');
          return false;
        }
      };

      // 导出缓存数据为 JSON 文件
      const exportCacheData = () => {

            showToast('没有可导出的缓存数据', 'warning');

          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `index_data_export_${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          console.log('[缓存管理] 数据已导出');
          showToast('数据已导出为 JSON 文件', 'success');
        } catch (err) {
          console.error('[缓存管理] 导出失败:', err);

      // 保存到本地文件（使用 File System Access API）
      const saveDataToFile = async (historyData) => {

          showToast('保存失败：' + err.message, 'error');
        }
      };

      // 使用 File System Access API 保存文件
      const saveWithFileSystemAPI = async (data, filename) => {

          // 检查浏览器是否支持
          if (!('showSaveFilePicker' in window)) {
            console.log('[文件系统 API] 浏览器不支持 File System Access API');
            return false;
          }
          
          const jsonString = JSON.stringify(data, null, 2);
          
          // 创建文件选择器
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{
              description: 'JSON 文件',
              accept: {
                'application/json': ['.json'],
              },
            }],
          });
          
          // 创建写入流
          const writable = await handle.createWritable();
          await writable.write(jsonString);
          await writable.close();
          
          console.log('[文件系统 API] 文件保存成功');
          return true;
        } catch (err) {
          if (err.name === 'AbortError') {
            console.log('[文件系统 API] 用户取消了保存操作');
            throw new Error('用户取消保存');
          }
          console.error('[文件系统 API] 保存失败:', err);
          return false;
        }
      };

      // 下载数据为 JSON 文件（降级方案）
      const downloadDataAsFile = (data, filename) => {
        try {
          const jsonString = JSON.stringify(data, null, 2);
          const blob = new Blob([jsonString], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');

          link.download = filename;

                    <p className="text-lg">P = 1 / (1 + exp(-(β₀ + β₁·R_adjusted + β₂·R_adjusted² + β₃·Vol + β₄·Mom_5d + β₅·MacroUncert + β₆·(R_adjusted × Mom_5d))))</p>
                  </div>
                </div>
                <div className="text-sm text-gray-600 dark:text-gray-400">

                  <ul className="space-y-1">
                    <li>• P：5 日内下跌概率</li>
                    <li>• R_adjusted：趋势调整后的综合风险分（同 T+1 模型）</li>
                    <li>• Vol：20 日波动率</li>
                    <li>• Mom_5d：前 5 日累计涨跌幅</li>
                    <li>• MacroUncert：宏观不确定性指数（由 PMI、PPI、CPI 波动率合成）</li>
                    <li>• R_adjusted × Mom_5d：风险分与动量的交互项（高风险 + 负动量时概率放大）</li>
                  </ul>
                  <div className="mt-3 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg border border-blue-200 dark:border-blue-800">

                    </p>
                  </div>

                        </tr>

                  <div className="bg-gradient-to-br from-purple-50 to-purple-100 dark:from-purple-900/30 dark:to-purple-800/20 p-5 rounded-lg">

                    <div className="bg-white dark:bg-gray-900/50 p-3 rounded-lg">
                      <p className="text-xs font-mono">20 日波动率 &gt; 10: +2 分</p>
                      <p className="text-xs font-mono">5 &lt; 20 日波动率 ≤ 10: +1 分</p>
                    </div>
                  </div>

                  {/* 5. 综合计算公式 */}
                  <div className="bg-gradient-to-br from-green-50 to-green-100 dark:from-green-900/30 dark:to-green-800/20 p-5 rounded-lg">

                    </div>

                  {/* 6. 多因子风险模型（25 因子） */}

                      <div className="bg-white dark:bg-gray-900/50 p-3 rounded-lg">
                        <p className="text-sm font-medium mb-2">标准化处理（分位数滚动标准化）：</p>
                        <p className="text-xs font-mono">F_normalized = (F - Q50) / (Q75 - Q25)</p>
                        <p className="text-xs text-gray-600 dark:text-gray-400 mt-1">其中 Q50、Q75、Q25 分别为滚动窗口的中位数、75 分位数、25 分位数</p>
                      </div>
                    </div>
                  </div>

                  {/* 7. 下跌概率预测 */}
                  <div className="bg-gradient-to-br from-red-50 to-red-100 dark:from-red-900/30 dark:to-red-800/20 p-5 rounded-lg">

                        <p className="text-xs font-mono bg-gray-100 dark:bg-gray-800 p-2 rounded">ln(P/(1-P)) = α₀ + α₁·R + α₂·R² + α₃·Vol + α₄·Mom</p>

                        <p className="text-xs font-mono bg-gray-100 dark:bg-gray-800 p-2 rounded">ln(P/(1-P)) = β₀ + β₁·R + β₂·R² + β₃·Vol + β₄·Mom_5d + β₅·Macro + β₆·(R·Mom)</p>
